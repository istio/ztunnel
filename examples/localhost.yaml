# This shows an example local config for ztunnel that adds a workload for localhost.
# This allows local testing by sending requests through the local ztunnel to other servers running on localhost.
workloads:
- uid: cluster1//v1/Pod/default/local
  name: local
  namespace: default
  serviceAccount: default
  workloadIps: ["127.0.0.1"]
  protocol: HBONE
  node: local
  network: ""
  services: {}
- uid: cluster1//v1/Pod/default/local-tcp
  name: dns
  namespace: default
  serviceAccount: default
  workloadIps: []
  hostname: example.com
  protocol: TCP
  node: local
  network: ""
  services:
    "default/example.com":
      8000: 8000
services:
- name: local
  namespace: default
  hostname: example.com
  vips:
    - /127.10.0.1
  ports:
    8000: 8000
  canonical: true
  loadBalancer:
    routingPreferences: []
    healthPolicy: AllowAll
    mode: Standard
    connectStrategy: FirstHealthyRace
